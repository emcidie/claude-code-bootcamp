<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMCIDIE Claude Code Bootcamp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="images/logo.svg" alt="EMCIDIE Claude Code Bootcamp" class="login-logo">
        <h1 class="login-title">EMCIDIE Claude Code Bootcamp</h1>
      </div>
      <form id="login-form">
        <div class="input-group">
          <label for="name">What's your name?</label>
          <input type="text" id="name" placeholder="Enter your name" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Start Bootcamp</button>
      </form>
      <p class="login-footer">Ready to learn? Just enter your name to begin.</p>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
