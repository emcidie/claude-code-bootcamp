<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMCIDIE Claude Code Bootcamp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="images/logo.svg" alt="EMCIDIE Claude Code Bootcamp" class="login-logo">
      </div>
      <form id="login-form">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <p id="login-error" class="login-error" style="display:none;"></p>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>
      <p class="login-footer">Sign in with the credentials provided by your administrator.</p>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
