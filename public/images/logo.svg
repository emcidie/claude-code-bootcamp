<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e07a3a"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <linearGradient id="jp-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="480" height="160" rx="16" fill="url(#bg-grad)"/>

  <!-- Japanese-inspired decorative elements -->
  <!-- Rising sun circle -->
  <circle cx="56" cy="65" r="28" fill="url(#jp-red)" opacity="0.9"/>
  <!-- Sun rays -->
  <g opacity="0.15" stroke="#dc2626" stroke-width="2" fill="none">
    <line x1="56" y1="25" x2="56" y2="10"/>
    <line x1="56" y1="105" x2="56" y2="120"/>
    <line x1="16" y1="65" x2="6" y2="65"/>
    <line x1="96" y1="65" x2="106" y2="65"/>
    <line x1="30" y1="39" x2="22" y2="31"/>
    <line x1="82" y1="91" x2="90" y2="99"/>
    <line x1="82" y1="39" x2="90" y2="31"/>
    <line x1="30" y1="91" x2="22" y2="99"/>
  </g>

  <!-- Terminal icon inside sun -->
  <rect x="42" y="53" width="28" height="20" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
  <polyline points="47,59 53,63 47,67" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="55" y1="67" x2="63" y2="67" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Main title -->
  <text x="100" y="52" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#e07a3a">JAPAN CMT</text>

  <text x="100" y="82" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="800" fill="white">Claude Code</text>

  <text x="100" y="108" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="url(#accent-grad)">Bootcamp</text>

  <!-- Decorative bottom bar -->
  <rect x="100" y="120" width="60" height="3" rx="1.5" fill="#e07a3a"/>
  <rect x="168" y="120" width="20" height="3" rx="1.5" fill="#dc2626"/>

  <!-- Tagline -->
  <text x="100" y="142" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#9ca3af" letter-spacing="0.5">Build software with AI — no experience needed</text>

  <!-- Code brackets decorative -->
  <text x="420" y="85" font-family="'SF Mono', 'Fira Code', monospace" font-size="48" font-weight="300" fill="white" opacity="0.08">&lt;/&gt;</text>
</svg>
